<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>馃崜 袘校袪袦袗袥袛袗</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Nunito', sans-serif; }
        body {
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(ellipse at 60% 30%, #2a0a3a 0%, #0a0018 50%, #000 100%);
        }

        /* FALLING COINS */
        .coin-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .coin {
            position: absolute; top: -40px; font-size: 20px;
            animation: coinFall linear infinite; opacity: 0;
            filter: drop-shadow(0 0 4px #ffd700);
        }
        @keyframes coinFall {
            0%   { transform: translateY(-40px) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.16; }
            90%  { opacity: 0.1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* MAIN CARD */
        .casino-machine {
            width: 400px; max-height: 96vh;
            overflow-y: auto; overflow-x: hidden;
            position: relative; z-index: 10;
            border-radius: 28px; padding: 24px 20px 20px;
            background: linear-gradient(170deg, #1a0025 0%, #0d0018 60%, #1a0008 100%);
            border: 2px solid rgba(255,200,0,0.35);
            box-shadow: 0 0 0 1px rgba(255,180,0,0.1), 0 0 40px rgba(200,0,0,0.4),
                        0 0 80px rgba(255,140,0,0.1), inset 0 1px 0 rgba(255,220,0,0.2);
            scrollbar-width: thin; scrollbar-color: #8b0000 transparent;
        }
        .casino-machine::-webkit-scrollbar { width: 4px; }
        .casino-machine::-webkit-scrollbar-thumb { background: #8b0000; border-radius: 4px; }

        /* TITLE */
        .casino-title {
            font-family: 'Fredoka One', cursive; font-size: 34px;
            text-align: center; margin-bottom: 14px; letter-spacing: 2px; color: #fff;
            text-shadow: 0 0 10px #ff4400, 0 0 30px #ff2200, 2px 2px 0 #8b0000, 4px 4px 0 #5a0000;
            animation: titlePop 3s ease-in-out infinite;
        }
        @keyframes titlePop {
            0%,100% { text-shadow: 0 0 10px #ff4400, 0 0 30px #ff2200, 2px 2px 0 #8b0000, 4px 4px 0 #5a0000; transform: scale(1); }
            50%      { text-shadow: 0 0 20px #ff6600, 0 0 50px #ff4400, 2px 2px 0 #8b0000, 4px 4px 0 #5a0000; transform: scale(1.02); }
        }

        /* LIGHT DOTS */
        .title-lights { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; }
        .light-dot {
            width: 10px; height: 10px; border-radius: 50%; background: #ffd700;
            box-shadow: 0 0 6px #ffd700, 0 0 12px #ffaa00;
            animation: lightBlink 1.2s ease-in-out infinite;
        }
        .light-dot:nth-child(2n) { animation-delay: 0.4s; background: #ff4400; box-shadow: 0 0 6px #ff4400, 0 0 12px #ff2200; }
        .light-dot:nth-child(3n) { animation-delay: 0.8s; }
        @keyframes lightBlink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.7)} }

        /* VIP BADGE */
        .vip-access {
            display: block;
            text-align: center;
            font-family: 'Fredoka One', cursive; font-size: 13px;
            letter-spacing: 3px; color: #111; cursor: pointer;
            padding: 5px 20px; margin: 0 auto 14px;
            width: fit-content;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 20px;
            box-shadow: 0 2px 0 #8b4500, 0 4px 12px rgba(255,180,0,0.5);
            animation: vipPulse 2s ease-in-out infinite; font-weight: 900;
        }
        @keyframes vipPulse {
            0%,100%{box-shadow:0 2px 0 #8b4500,0 4px 12px rgba(255,180,0,0.5)}
            50%    {box-shadow:0 2px 0 #8b4500,0 4px 22px rgba(255,180,0,0.9)}
        }

        /* INFO BAR */
        .info-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.45); padding: 10px 14px;
            border-radius: 16px; border: 1px solid rgba(255,180,0,0.2); margin-bottom: 14px;
        }
        .player-name { font-size: 12px; font-weight: 800; color: rgba(255,220,100,0.65); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
        .balance-val { font-family: 'Fredoka One', cursive; font-size: 22px; color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.7); }
        .settings-btn {
            width: 38px; height: 38px; border-radius: 50%;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,180,0,0.25);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 18px; transition: all 0.3s;
        }
        .settings-btn:hover { background: rgba(255,180,0,0.15); transform: rotate(45deg); }

        /* SLOT FRAME */
        .slot-frame {
            background: linear-gradient(180deg, #8b0000 0%, #6b0000 40%, #3d0000 100%);
            border-radius: 22px; padding: 4px; margin-bottom: 16px;
            box-shadow: 0 0 0 2px #ffd700, 0 0 0 4px #cc8800, 0 6px 20px rgba(200,0,0,0.6), 0 0 40px rgba(255,100,0,0.2);
            position: relative;
        }
        .slot-frame-lights { position: absolute; top: -5px; left: 10px; right: 10px; display: flex; justify-content: space-between; }
        .frame-light {
            width: 8px; height: 8px; border-radius: 50%;
            background: #ffd700; box-shadow: 0 0 5px #ffd700;
            animation: frameLightAnim 0.7s ease-in-out infinite alternate;
        }
        .frame-light:nth-child(even) { background: #ff4400; box-shadow: 0 0 5px #ff4400; animation-delay: 0.35s; }
        @keyframes frameLightAnim { from{opacity:1} to{opacity:0.15} }

        .slot-container {
            background: linear-gradient(180deg, #1a0000, #0a0010);
            padding: 14px 12px; border-radius: 18px;
            display: flex; gap: 8px; justify-content: center; position: relative;
        }
        .slot-container::before {
            content: ''; position: absolute; left: 12px; right: 12px; top: 50%;
            height: 2px; background: rgba(255,215,0,0.15); pointer-events: none;
        }
        .slot-window {
            width: 88px; height: 110px;
            background: linear-gradient(180deg, #0a0010, #15001a);
            border-radius: 12px; position: relative; overflow: hidden;
            border: 2px solid rgba(255,180,0,0.3);
            box-shadow: inset 0 4px 16px rgba(0,0,0,0.9);
        }
        .slot-reel { position: absolute; top: 0; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .slot-reel span { height: 110px; font-size: 58px; line-height: 110px; display: block; }

        /* SPIN BUTTON */
        .btn-spin {
            width: 100%; padding: 18px;
            font-family: 'Fredoka One', cursive; font-size: 24px;
            letter-spacing: 4px; color: #fff; border: none;
            border-radius: 18px; cursor: pointer; text-transform: uppercase;
            margin-bottom: 10px; position: relative; overflow: hidden;
            background: linear-gradient(180deg, #ff3300 0%, #cc0000 50%, #8b0000 100%);
            box-shadow: 0 6px 0 #4a0000, 0 10px 20px rgba(200,0,0,0.5), inset 0 1px 0 rgba(255,150,100,0.4);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); transition: all 0.12s;
            animation: spinBtnGlow 2.5s ease-in-out infinite;
        }
        @keyframes spinBtnGlow {
            0%,100%{box-shadow:0 6px 0 #4a0000,0 10px 20px rgba(200,0,0,0.5),inset 0 1px 0 rgba(255,150,100,0.4)}
            50%    {box-shadow:0 6px 0 #4a0000,0 10px 35px rgba(255,60,0,0.8),inset 0 1px 0 rgba(255,150,100,0.4)}
        }
        .btn-spin::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: btnShimmer 2.5s ease-in-out infinite;
        }
        @keyframes btnShimmer { 0%{left:-100%} 60%,100%{left:150%} }
        .btn-spin:active { transform: translateY(5px); box-shadow: 0 1px 0 #4a0000, 0 4px 10px rgba(200,0,0,0.3), inset 0 1px 0 rgba(255,150,100,0.4); }
        .btn-spin:disabled { filter: grayscale(0.7) brightness(0.5); animation: none; cursor: not-allowed; }
        .btn-spin:disabled::before { animation: none; }

        /* PROMO BUTTON */
        .promo-btn {
            width: 100%; padding: 13px;
            font-family: 'Fredoka One', cursive; font-size: 16px;
            letter-spacing: 2px; color: #ffd700;
            border: 2px solid rgba(255,215,0,0.35); border-radius: 14px;
            cursor: pointer; text-transform: uppercase; margin-bottom: 12px;
            background: rgba(255,180,0,0.07); transition: all 0.25s;
        }
        .promo-btn:hover { background: rgba(255,180,0,0.15); border-color: #ffd700; box-shadow: 0 0 16px rgba(255,180,0,0.3); }
        .promo-btn:active { transform: scale(0.98); }

        /* HISTORY */
        .history-label { font-size: 10px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,180,0,0.4); text-align: center; margin-bottom: 5px; }
        .history-box {
            height: 56px; overflow-y: auto;
            font-size: 11px; font-weight: 700;
            color: rgba(255,200,80,0.6);
            background: rgba(0,0,0,0.4); padding: 7px 10px;
            border-radius: 12px; border: 1px solid rgba(255,180,0,0.1);
            scrollbar-width: thin; scrollbar-color: #4a0000 transparent;
        }
        .history-box::-webkit-scrollbar { width: 3px; }
        .history-box::-webkit-scrollbar-thumb { background: #4a0000; }

        /* PANELS */
        #settings-panel, #admin-panel, #user-profile-panel {
            display: none; position: absolute; top: 8px; left: 8px; right: 8px;
            background: linear-gradient(160deg, #180020, #0a0015);
            border: 2px solid rgba(255,200,0,0.4);
            padding: 20px 18px; z-index: 100; border-radius: 22px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.95), 0 0 30px rgba(200,0,0,0.15);
        }
        .panel-title { font-family: 'Fredoka One', cursive; font-size: 18px; letter-spacing: 2px; text-align: center; margin-bottom: 14px; color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.4); }
        .panel-title.red { color: #ff5555; text-shadow: 0 0 10px rgba(255,60,60,0.4); }

        /* INPUTS */
        input[type="text"], input[type="password"] {
            width: 100%; display: block; margin: 0 0 12px;
            padding: 14px 18px; border-radius: 14px;
            background: rgba(0,0,0,0.55); color: #fff;
            border: 2px solid rgba(255,100,0,0.3);
            text-align: center; font-size: 15px;
            font-family: 'Nunito', sans-serif; font-weight: 800; letter-spacing: 2px;
            outline: none; transition: border-color 0.3s, box-shadow 0.3s;
        }
        input[type="text"]::placeholder, input[type="password"]::placeholder { color: rgba(255,180,100,0.35); letter-spacing: 2px; font-size: 13px; }
        input[type="text"]:focus, input[type="password"]:focus { border-color: #ff4400; box-shadow: 0 0 14px rgba(255,60,0,0.25); }
        input[type="range"] { width: 85%; display: block; margin: 0 auto 10px; accent-color: #ff3300; }

        /* LOGIN BUTTON */
        .btn-login {
            width: 100%; padding: 15px;
            font-family: 'Fredoka One', cursive; font-size: 18px; letter-spacing: 4px;
            color: #fff; background: linear-gradient(180deg, #ff3300, #8b0000);
            border: none; border-radius: 14px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 5px 0 #3a0000, 0 8px 18px rgba(200,0,0,0.4); transition: all 0.15s;
        }
        .btn-login:hover { filter: brightness(1.1); }
        .btn-login:active { transform: translateY(4px); box-shadow: 0 1px 0 #3a0000; }

        /* MUTE */
        .mute-toggle { padding: 10px 14px; border-radius: 10px; width: 100%; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 1px; cursor: pointer; border: 1px solid; margin-bottom: 5px; transition: all 0.2s; }
        .on  { background: rgba(46,125,50,0.2); color: #66bb6a; border-color: rgba(76,175,80,0.3); }
        .off { background: rgba(192,57,43,0.2); color: #ef5350; border-color: rgba(231,76,60,0.3); }

        /* MUSIC LIST */
        .music-list {
            background: rgba(0,0,0,0.45); border: 1px solid rgba(255,180,0,0.15);
            border-radius: 12px; padding: 4px; max-height: 130px; overflow-y: auto; margin-bottom: 10px;
            scrollbar-width: thin; scrollbar-color: #4a0000 transparent;
        }
        .music-item { display: flex; align-items: center; padding: 7px 10px; border-bottom: 1px solid rgba(255,180,0,0.05); font-size: 12px; font-weight: 700; color: rgba(255,220,150,0.55); transition: background 0.2s; border-radius: 8px; }
        .music-item:hover { background: rgba(255,100,0,0.07); }
        .music-item.active { color: #ffd700; background: rgba(255,100,0,0.12); }
        .music-item label { flex-grow: 1; cursor: pointer; }
        .loop-checkbox { width: 16px; height: 16px; margin-left: 8px; cursor: pointer; accent-color: #ff3300; }

        /* PANEL CLOSE */
        .btn-panel-close { width: 100%; padding: 10px; margin-top: 10px; border-radius: 12px; background: transparent; color: rgba(255,180,0,0.45); border: 1px solid rgba(255,180,0,0.2); cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; transition: all 0.2s; }
        .btn-panel-close:hover { border-color: #ffd700; color: #ffd700; }

        /* ADMIN LIST */
        .users-list-container { max-height: 170px; overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 12px; border: 1px solid rgba(255,180,0,0.15); padding: 4px; margin-bottom: 4px; scrollbar-width: thin; scrollbar-color: #4a0000 transparent; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; border-bottom: 1px solid rgba(255,180,0,0.07); color: rgba(255,220,150,0.8); font-size: 13px; font-weight: 700; transition: background 0.2s; border-radius: 8px; }
        .user-row:hover { background: rgba(255,100,0,0.07); }

        .mod-btn-pos { flex:1; padding: 9px; background: rgba(46,125,50,0.2); color: #66bb6a; border: 1px solid rgba(76,175,80,0.25); border-radius: 10px; font-weight: 900; cursor: pointer; font-family: 'Fredoka One', cursive; font-size: 15px; transition: all 0.2s; }
        .mod-btn-pos:hover { background: rgba(46,125,50,0.4); }
        .mod-btn-neg { flex:1; padding: 9px; background: rgba(192,57,43,0.2); color: #ef5350; border: 1px solid rgba(231,76,60,0.25); border-radius: 10px; font-weight: 900; cursor: pointer; font-family: 'Fredoka One', cursive; font-size: 15px; transition: all 0.2s; }
        .mod-btn-neg:hover { background: rgba(192,57,43,0.4); }
        .btn-back { width: 100%; padding: 10px; background: transparent; color: #ffd700; border: 1px solid rgba(255,215,0,0.3); border-radius: 10px; font-weight: 800; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; transition: all 0.2s; }
        .btn-back:hover { background: rgba(255,180,0,0.08); }

        /* ADMIN CONTROL BUTTONS */
        .admin-ctrl-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn-admin-ctrl {
            flex: 1; padding: 10px 6px;
            font-family: 'Fredoka One', cursive; font-size: 13px; letter-spacing: 1px;
            color: #fff; border: none; border-radius: 12px; cursor: pointer;
            text-transform: uppercase; transition: all 0.2s;
        }
        .btn-ctrl-blue { background: linear-gradient(180deg, #1565c0, #0d47a1); box-shadow: 0 3px 0 #082788; }
        .btn-ctrl-blue:hover { filter: brightness(1.15); }
        .btn-ctrl-blue:active { transform: translateY(2px); box-shadow: 0 1px 0 #082788; }
        .btn-ctrl-purple { background: linear-gradient(180deg, #7b1fa2, #4a148c); box-shadow: 0 3px 0 #2a0060; }
        .btn-ctrl-purple:hover { filter: brightness(1.15); }
        .btn-ctrl-purple:active { transform: translateY(2px); box-shadow: 0 1px 0 #2a0060; }

        /* CHANCE INDICATOR in profile */
        .chance-indicator {
            text-align: center; margin-bottom: 10px;
            font-family: 'Fredoka One', cursive; font-size: 15px;
            color: #ffd700; letter-spacing: 1px;
        }
        .chance-badge {
            display: inline-block; padding: 3px 14px;
            background: linear-gradient(135deg, #7b1fa2, #4a148c);
            border-radius: 20px; font-size: 14px;
            box-shadow: 0 2px 8px rgba(123,31,162,0.5);
        }

        /* CHANCE MODAL */
        #chance-modal {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(160deg, #180020, #0a0015);
            border: 2px solid rgba(123,31,162,0.7);
            padding: 22px 20px; z-index: 200; border-radius: 22px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.95), 0 0 30px rgba(123,31,162,0.3);
            width: 260px; text-align: center;
        }
        .chance-modal-title { font-family: 'Fredoka One', cursive; font-size: 16px; color: #ce93d8; letter-spacing: 2px; margin-bottom: 14px; }
        .chance-options { display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; }
        .btn-chance-opt {
            padding: 10px 16px;
            font-family: 'Fredoka One', cursive; font-size: 18px;
            color: #fff; border: none; border-radius: 12px; cursor: pointer;
            background: linear-gradient(180deg, #7b1fa2, #4a148c);
            box-shadow: 0 3px 0 #2a0060; transition: all 0.15s;
        }
        .btn-chance-opt:hover { filter: brightness(1.2); }
        .btn-chance-opt:active { transform: translateY(2px); box-shadow: 0 1px 0 #2a0060; }
        .btn-chance-opt.active-chance { background: linear-gradient(180deg, #ff8f00, #e65100); box-shadow: 0 3px 0 #8b2700; }


        .prof-balance-text { font-family: 'Fredoka One', cursive; font-size: 24px; color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .gold-divider { width: 100%; height: 1px; margin: 12px 0; background: linear-gradient(90deg, transparent, rgba(255,180,0,0.3), transparent); }

        /* AGE GATE */
        #age-gate { position: fixed; inset: 0; background: radial-gradient(ellipse at center, #0d0010 0%, #000 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; gap: 22px; }
        .age-icon { font-size: 64px; animation: ageBounce 2s ease-in-out infinite; }
        @keyframes ageBounce { 0%,100%{transform:scale(1) rotate(-3deg)} 50%{transform:scale(1.08) rotate(3deg)} }
        .age-title { font-family: 'Fredoka One', cursive; font-size: 28px; letter-spacing: 4px; color: #fff; text-shadow: 0 0 20px #ff3300, 0 0 40px #ff0000; }
        .age-divider { width: 100px; height: 2px; background: linear-gradient(90deg, transparent, #ffd700, transparent); }
        .btn-age { padding: 16px 52px; font-family: 'Fredoka One', cursive; font-size: 18px; letter-spacing: 3px; color: #fff; background: linear-gradient(180deg, #ff3300, #8b0000); border: none; border-radius: 18px; cursor: pointer; text-transform: uppercase; box-shadow: 0 6px 0 #3a0000, 0 10px 30px rgba(200,0,0,0.5); transition: all 0.2s; }
        .btn-age:hover { filter: brightness(1.12); }
        .btn-age:active { transform: translateY(4px); }
        .btn-age-decline { padding: 12px 40px; font-family: 'Fredoka One', cursive; font-size: 15px; letter-spacing: 2px; color: rgba(255,180,100,0.5); background: transparent; border: 1px solid rgba(255,100,0,0.25); border-radius: 14px; cursor: pointer; text-transform: uppercase; transition: all 0.2s; }
        .btn-age-decline:hover { color: rgba(255,180,100,0.8); border-color: rgba(255,100,0,0.5); }

        /* WIN FLASH */
        @keyframes winFlash {
            0%  {box-shadow:0 0 0 2px #ffd700,0 0 0 4px #cc8800,0 6px 20px rgba(200,0,0,0.6)}
            25% {box-shadow:0 0 0 2px #ffd700,0 0 0 6px #ffaa00,0 6px 60px rgba(255,215,0,0.9),0 0 80px rgba(255,215,0,0.5)}
            75% {box-shadow:0 0 0 2px #ffd700,0 0 0 5px #ffaa00,0 6px 40px rgba(255,180,0,0.6)}
            100%{box-shadow:0 0 0 2px #ffd700,0 0 0 4px #cc8800,0 6px 20px rgba(200,0,0,0.6)}
        }
        .win-flash { animation: winFlash 0.8s ease-out 3; }
    </style>
</head>
<body onclick="closePanels()">

<div class="coin-bg" id="coin-bg"></div>

<!-- AGE GATE -->
<div id="age-gate">
    <div class="age-icon">馃敒</div>
    <div class="age-title">孝袨袥鞋袣袨 18+</div>
    <div class="age-divider"></div>
    <p style="color:rgba(255,180,100,0.5);font-size:12px;letter-spacing:2px;font-weight:700;">袩袨袛孝袙袝袪袛袠 小袙袨袡 袙袨袟袪袗小孝</p>
    <button class="btn-age" onclick="verifyAge()">袦袧袝 袝小孝鞋 18</button>
    <button class="btn-age-decline" onclick="window.location.href='https://www.google.com'">袦袧袝 袧袝孝 18</button>
</div>

<!-- MAIN -->
<div class="casino-machine" onclick="event.stopPropagation()">

    <!-- AUTH -->
    <div id="auth-section">
        <h1 class="casino-title">馃崜 袘校袪袦袗袥袛袗</h1>
        <div class="title-lights">
            <div class="light-dot"></div><div class="light-dot"></div>
            <div class="light-dot"></div><div class="light-dot"></div>
            <div class="light-dot"></div><div class="light-dot"></div>

    function login() {

    async function spin() {
        const s = await db.ref('players/' + user).once('value');
        const d = s.val();
        if (d.balance < 1) { if (sOn) S.interpol.play(); return; }

        // 效懈褌邪械屑 屑薪芯卸懈褌械谢褜 褕邪薪褋邪 懈谐褉芯泻邪 懈蟹 Firebase
        const chanceMultiplier = d.chanceMultiplier || 1;

        // 袚械薪械褉邪褑懈褟 褉械蟹褍谢褜褌邪褌邪 褋 褍褔褢褌芯屑 屑薪芯卸懈褌械谢褟
        // 袘邪蟹芯胁褘泄 褕邪薪褋 3 芯写懈薪邪泻芯胁褘褏 ~4%, 2 芯写懈薪邪泻芯胁褘褏 ~48%
        // 袩褉懈 褏2: 褍写胁邪懈胁邪械屑 胁械褉芯褟褌薪芯褋褌褜 胁褘懈谐褉褘褕邪; 锌褉懈 褏5: 胁锌褟褌械褉芯
        let res;
        const rand = Math.random();
        const tripleChance = Math.min(0.04 * chanceMultiplier, 0.8);
        const pairChance   = Math.min(0.48 * chanceMultiplier, 0.97);

        if (rand < tripleChance) {
            // 孝褉懈 芯写懈薪邪泻芯胁褘褏
            const icon = icons[Math.floor(Math.random() * icons.length)];
            res = [icon, icon, icon];
        } else if (rand < tripleChance + pairChance) {
            // 袛胁邪 芯写懈薪邪泻芯胁褘褏
            const icon = icons[Math.floor(Math.random() * icons.length)];
            const other = icons[Math.floor(Math.random() * icons.length)];
            const pos = Math.floor(Math.random() * 3);
            res = [icon, icon, icon];
            res[pos] = other;
        } else {
            // 袙褋械 褉邪蟹薪褘械
            do { res = [icons[Math.floor(Math.random()*5)], icons[Math.floor(Math.random()*5)], icons[Math.floor(Math.random()*5)]]; }
            while (res[0]===res[1] || res[1]===res[2] || res[0]===res[2]);
        }

        document.getElementById('spin-btn').disabled = true;

        if (noDelay) {
            // 袦谐薪芯胁械薪薪褘泄 褉械蟹褍谢褜褌邪褌 斜械蟹 邪薪懈屑邪褑懈懈
            [1, 2, 3].forEach((n, i) => {
                const r = document.getElementById('reel' + n);
                r.style.transition = '0s'; r.style.transform = 'translateY(0)';
                r.querySelector('span:last-child').innerText = res[i];
                r.style.transform = 'translateY(-3190px)';
            });
            resolveSpinResult(res, d, chanceMultiplier);
        } else {
            // 袨斜褘褔薪邪褟 邪薪懈屑邪褑懈褟
            [1, 2, 3].forEach((n, i) => {
                const r = document.getElementById('reel' + n);
                r.style.transition = '0s'; r.style.transform = 'translateY(0)';
                r.querySelector('span:last-child').innerText = res[i];
                setTimeout(() => { r.style.transition = `transform ${2 + i}s ease-in-out`; r.style.transform = 'translateY(-3190px)'; }, 50);
            });
            setTimeout(() => resolveSpinResult(res, d, chanceMultiplier), 5000);
        }
    }

    function resolveSpinResult(res, d, chanceMultiplier) {
        // 袙褘懈谐褉褘褕 褍屑薪芯卸邪械褌褋褟 薪邪 multiplier
        let baseWin = (res[0] === res[1] && res[1] === res[2]) ? 5
                    : (res[0] === res[1] || res[1] === res[2] || res[0] === res[2]) ? 2 : 0;
        let win = baseWin === 0 ? 0 : Math.round(baseWin * chanceMultiplier);

        if (win > 0) {
            const frame = document.getElementById('slot-frame');
            frame.classList.add('win-flash');
            setTimeout(() => frame.classList.remove('win-flash'), 2400);
            if (sOn) { (res[0]===res[1]&&res[1]===res[2]) ? S.jps[Math.floor(Math.random()*2)].play() : S.win2.play(); }
        }
        const delta = win - 1;
        db.ref('players/' + user).update({
            balance: d.balance - 1 + win,
            history: [...(d.history || []), `${res.join('')} ${delta >= 0 ? '+' : ''}${delta} 袗袪`].slice(-15)
        });
        document.getElementById('spin-btn').disabled = false;
    }

    // 鈹€鈹€ 袩袪袨袦袨袣袨袛 袠小袩袪袗袙袥袝袧: 褋褌褉芯谐邪褟 锌褉芯胁械褉泻邪 芯写薪芯褉邪蟹芯胁芯谐芯 懈褋锌芯谢褜蟹芯胁邪薪懈褟 鈹€鈹€
    function promptPromo() {
        const input = prompt("袙胁械写懈 锌褉芯屑芯泻芯写:");

        if (!(code in promoCodes)) { alert("鉂?袩褉芯屑芯泻芯写 薪械 薪邪泄写械薪!"); return; }

        db.ref('players/' + user + '/usedPromos/' + code).once('value').then(snap => {

        document.getElementById('user-profile-panel').style.display = 'block';
        document.getElementById('prof-name').innerText = u.toUpperCase();
        db.ref('players/' + u).on('value', s => {
            if (s.exists()) {
                const d = s.val();
                document.getElementById('prof-balance').innerText = d.balance;
                document.getElementById('prof-history').innerHTML = (d.history || []).slice().reverse()
                    .map(h => `<div style="padding:2px 0;">> ${h}</div>`).join('');
                const mult = d.chanceMultiplier || 1;
                document.getElementById('prof-chance-badge').textContent = '褏' + mult;
            }
        });
    }

    // 鈹€鈹€ 袘袝袟 袟袗袛袝袪袞袣袠 鈹€鈹€
    function toggleNoDelay() {
        noDelay = !noDelay;
        const btn = document.getElementById('nodelay-btn');
        btn.textContent = noDelay ? '鈿?袘袝袟 袟袗袛袝袪袞袣袠: 袙袣袥' : '鈿?袘袝袟 袟袗袛袝袪袞袣袠: 袙蝎袣袥';
        btn.style.background = noDelay
            ? 'linear-gradient(180deg,#00897b,#00695c)'
            : 'linear-gradient(180deg,#1565c0,#0d47a1)';
    }

    // 鈹€鈹€ 楔袗袧小 袦袨袛袗袥 鈹€鈹€
    function openChanceModal() {
        const modal = document.getElementById('chance-modal');
        modal.style.display = 'block';
        // 袩芯写褋胁械褌懈褌褜 褌械泻褍褖懈泄 邪泻褌懈胁薪褘泄 褕邪薪褋
        db.ref('players/' + selU + '/chanceMultiplier').once('value').then(s => {
            const current = s.val() || 1;
            modal.querySelectorAll('.btn-chance-opt').forEach(btn => {
                const v = parseInt(btn.textContent.replace('褏',''));
                btn.classList.toggle('active-chance', v === current);
            });
        });
    }

    function closeChanceModal() {
        document.getElementById('chance-modal').style.display = 'none';
    }

    function setChance(mult) {
        db.ref('players/' + selU + '/chanceMultiplier').set(mult).then(() => {
            document.getElementById('prof-chance-badge').textContent = '褏' + mult;
            // 袨斜薪芯胁懈褌褜 锌芯写褋胁械褌泻褍 泻薪芯锌芯泻
            document.querySelectorAll('.btn-chance-opt').forEach(btn => {
                const v = parseInt(btn.textContent.replace('褏',''));
                btn.classList.toggle('active-chance', v === mult);
            });
        });
    }

    function modBal(v) { db.ref('players/' + selU + '/balance').transaction(b => (b || 0) + v); }
    function backToAdmin() { document.getElementById('user-profile-panel').style.display = 'none'; document.getElementById('admin-panel').style.display = 'block'; }
    function toggleSettings(e) { e.stopPropagation(); document.getElementById('settings-panel').style.display = 'block'; renderPlaylist(); }
    function closePanels() { ['settings-panel', 'admin-panel', 'user-profile-panel', 'chance-modal'].forEach(p => document.getElementById(p).style.display = 'none'); }

    function applyVolumes() {
        const mVol = document.getElementById('music-vol').value;
        const sVol = document.getElementById('sound-vol').value;
        bgMusic.volume = mOn ? mVol : 0;
        if (mOn) bgMusic.play().catch(() => {}); else bgMusic.pause();
        const mBtn = document.getElementById('m-toggle');
        const sBtn = document.getElementById('s-toggle');
        mBtn.className = mOn ? "mute-toggle on" : "mute-toggle off";
        mBtn.textContent = mOn ? "馃幍 袦校袟蝎袣袗: 袙袣袥" : "馃幍 袦校袟蝎袣袗: 袙蝎袣袥";
        sBtn.className = sOn ? "mute-toggle on" : "mute-toggle off";
        sBtn.textContent = sOn ? "馃攰 袟袙校袣袠: 袙袣袥" : "馃攰 袟袙校袣袠: 袙蝎袣袥";
        Object.values(S).flat().forEach(a => { if (a instanceof Audio) a.volume = sOn ? sVol : 0; });
    }

    function toggleMute(t) { if (t === 'music') mOn = !mOn; else sOn = !sOn; applyVolumes(); }

    function verifyAge() { localStorage.setItem('adult', 'true'); document.getElementById('age-gate').remove(); }
    if (localStorage.getItem('adult') === 'true') document.getElementById('age-gate')?.remove();
</script>
</body>
