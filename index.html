<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍓 БУРМАЛДА</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { width: 380px; background: #3c4043; border: 3px solid #5f6368; padding: 25px; border-radius: 5px; text-align: center; position: relative; }
        .settings-icon { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 24px; z-index: 10; opacity: 0.7; }
        .admin-btn-open { position: absolute; top: 15px; left: 15px; cursor: pointer; font-size: 12px; background: #555; padding: 5px; border-radius: 3px; z-index: 10; }
        
        #settings-panel, #admin-panel, #user-profile-panel { display: none; position: absolute; top: 50px; left: 15px; right: 15px; background: #202124; border: 1px solid #5f6368; padding: 15px; text-align: left; z-index: 20; border-radius: 8px; max-height: 80vh; overflow-y: auto; }
        
        .slot-machine { background: #202124; border: 2px solid #5f6368; display: flex; justify-content: center; gap: 10px; padding: 20px; margin: 20px 0; }
        .slot { width: 80px; height: 110px; background: #202124; border: 2px solid #5f6368; font-size: 60px; line-height: 110px; }
        .btn-main { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; color: #fff; margin-bottom: 10px; text-transform: uppercase; }
        .btn-spin { background: #b71c1c; border-bottom: 4px solid #7f0000; }
        .btn-promo { background: #b8860b; border-bottom: 4px solid #8b4513; }
        .logs-box { background: #1a1a1a; border: 1px solid #5f6368; height: 100px; overflow-y: auto; text-align: left; padding: 10px; font-size: 13px; color: #fdd835; }
        
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #333; cursor: pointer; }
        .user-item:hover { background: #333; }
        .del-btn { color: #ff4444; font-weight: bold; padding: 5px 10px; cursor: pointer; }
        .profile-btn { background: #444; color: white; border: none; padding: 10px; margin: 5px; cursor: pointer; width: 45%; font-size: 16px; }
        #auth-section input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #5f6368; border-radius: 3px; background: #fff; display: block; }
        
        /* Стиль для истории в админке с крестиком */
        .hist-item-admin { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; border-bottom: 1px solid #2a2a2a; }
        .hist-del { color: #ff4444; cursor: pointer; padding: 0 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section">
        <h1 style="color:#b71c1c">🍓 БУРМАЛДА</h1>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="login()" class="btn-main" style="background:#5f6368">ЗАЙТИ</button>
    </div>

    <div id="game-section" style="display:none;">
        <div class="admin-btn-open" onclick="toggleAdmin()">АДМИН</div>
        <div class="settings-icon" onclick="toggleSettings()">⚙️</div>
        
        <div id="admin-panel">
            <h3 style="margin:0 0 10px 0; color: #fdd835;">ИГРОКИ</h3>
            <div id="users-list"></div>
            <button class="btn-main" style="background:#555; font-size:12px; margin-top:10px;" onclick="closePanels()">ЗАКРЫТЬ</button>
        </div>

        <div id="user-profile-panel">
            <h3 id="prof-name" style="margin:0; color:#81c995"></h3>
            <p>Баланс: <span id="prof-balance"></span> АР</p>
            <div style="display:flex; flex-wrap: wrap; justify-content: center;">
                <button class="profile-btn" onclick="modBal(1)">+1</button>
                <button class="profile-btn" onclick="modBal(10)">+10</button>
                <button class="profile-btn" onclick="modBal(-1)">-1</button>
                <button class="profile-btn" onclick="modBal(-10)">-10</button>
            </div>
            <div id="prof-history" class="logs-box" style="height:150px; margin-top:10px;"></div>
            <button class="btn-main" style="background:#555; font-size:12px; margin-top:10px;" onclick="backToAdmin()">НАЗАД</button>
        </div>

        <div id="settings-panel">
            <label style="font-size:11px;">Музыка:</label>
            <select id="bg-music-select" onchange="changeMusic()" style="width:100%; margin-bottom:10px;">
                <option value="ananasevi_sirop_1.mp3">Ананасовый сироп</option>
                <option value="baclachn.mp3">Баклажан</option>
                <option value="bad_piggies.mp3">Bad Piggies</option>
                <option value="bam_bam_bam_1.mp3">Бам Бам Бам</option>
                <option value="nobody.mp3">Возьми телефон</option>
                <option value="pay_pay_pay.mp3">Ам Ам Ам</option>
            </select>
            <input type="range" id="music-vol" min="0" max="1" step="0.1" value="0.3" oninput="applyVolumes()">
            <input type="range" id="sound-vol" min="0" max="1" step="0.1" value="0.7" oninput="applyVolumes()">
            <label style="cursor:pointer; font-size:12px;"><input type="checkbox" id="sounds-on" checked> Звук ВКЛ</label>
        </div>

        <h2 id="display-name" style="margin:0; color:#bdc1c6">---</h2>
        <h3 style="color:#81c995">АР: <span id="balance">0</span></h3>

        <div class="slot-machine">
            <div id="s1" class="slot">?</div>
            <div id="s2" class="slot">?</div>
            <div id="s3" class="slot">?</div>
        </div>

        <button id="spin-btn" class="btn-main btn-spin" onclick="spin()">КРУТИТЬ (1 АР)</button>
        <button class="btn-main btn-promo" onclick="promptPromo()">ПРОМОКОД</button>
        <div id="history" class="logs-box"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCyptPoeoccBngAMfG_R-t32FOfIGJY13s",
        authDomain: "dima256.firebaseapp.com",
        databaseURL: "https://dima256-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "dima256",
        storageBucket: "dima256.firebasestorage.app",
        messagingSenderId: "208400853144",
        appId: "1:208400853144:web:78eb608f5aacd57e8848ed"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const S = {
        fail: new Audio('ti_blat_dolbaub_naxyi_1.mp3'),
        win2: new Audio('vrode_da_vrode_net_1.mp3'),
        stay: new Audio('echo_posedim_1.mp3'),
        interpol: new Audio('zapert_na_ostrove_izza_interpola_1.mp3'),
        cry: new Audio('dai_cledychi_spin_1.mp3'),
        bam: new Audio('bam.mp3'),
        jps: [new Audio('o_mai_gad_1.mp3'), new Audio('nixya_ti_blat_1.mp3'), new Audio('oi_oi_oi_oi_1.mp3')]
    };

    let bgMusic = new Audio(); bgMusic.loop = true;
    let user = ""; let selectedUser = "";

    function applyVolumes() {
        bgMusic.volume = document.getElementById('music-vol').value;
        const sv = document.getElementById('sound-vol').value;
        Object.values(S).flat().forEach(a => { a.volume = sv; });
    }

    function playSnd(aud) {
        if (!document.getElementById('sounds-on').checked) return;
        aud.currentTime = 0; aud.play().catch(()=>{});
    }

    function login() {
        Object.values(S).flat().forEach(a => { a.play().then(()=>a.pause()).catch(()=>{}); });
        user = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        if(!user || !p) return;
        db.ref('players/' + user).once('value', s => {
            if(!s.exists()) db.ref('players/' + user).set({balance: 5, password: p, history: ["Регистрация +5 АР"]}).then(() => go());
            else (s.val().password === p) ? go() : (playSnd(S.fail), alert("ПАРОЛЬ!"));
        });
    }

    function go() {
        document.getElementById('auth-section').style.display='none';
        document.getElementById('game-section').style.display='block';
        document.getElementById('display-name').innerText = user;
        applyVolumes();
        bgMusic.src = document.getElementById('bg-music-select').value;
        bgMusic.play().catch(()=>{});
        db.ref('players/' + user).on('value', snap => {
            const d = snap.val();
            if(d) {
                document.getElementById('balance').innerText = d.balance;
                document.getElementById('history').innerHTML = (d.history || []).slice().reverse().map(h => `<div>> ${h}</div>`).join('');
            }
        });
    }

    async function spin() {
        const btn = document.getElementById('spin-btn');
        const s = await db.ref('players/' + user).once('value');
        const d = s.val();
        if(d.balance < 1) { playSnd(S.interpol); return alert("АР закончились!"); }
        btn.disabled = true;
        if (document.getElementById('sounds-on').checked) { S.bam.currentTime = 0; S.bam.play(); setTimeout(()=>S.bam.pause(), 400); }
        const ic = ['🍏', '🍌', '🍓', '🍒', '🍋'];
        const r = [ic[Math.floor(Math.random()*5)], ic[Math.floor(Math.random()*5)], ic[Math.floor(Math.random()*5)]];
        const el = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
        el.forEach(e => e.innerText = "?");
        setTimeout(() => el[0].innerText = r[0], 1600);
        setTimeout(() => el[1].innerText = r[1], 3200);
        setTimeout(() => {
            el[2].innerText = r[2];
            let win = 0;
            if(r[0]===r[1] && r[1]===r[2]) { win = 5; playSnd(S.jps[Math.floor(Math.random()*3)]); }
            else if(r[0]===r[1] || r[1]===r[2] || r[0]===r[2]) { win = 2; playSnd(S.win2); }
            else { if(Math.random() < 0.4) playSnd(S.stay); else if(Math.random() < 0.3) playSnd(S.cry); }
            db.ref('players/' + user).update({
                balance: d.balance - 1 + win,
                history: [...(d.history || []), `${r.join('')} | ${win-1>=0 ? '+'+(win-1) : '-1'} АР`].slice(-10)
            });
            btn.disabled = false;
        }, 5000);
    }

    // --- АДМИНКА ---
    function toggleAdmin() {
        if (prompt("Пароль:") !== "1337") return alert("НЕТ!");
        document.getElementById('admin-panel').style.display = 'block';
        loadUsers();
    }

    function loadUsers() {
        db.ref('players').on('value', s => {
            const list = document.getElementById('users-list');
            list.innerHTML = "";
            s.forEach(child => {
                const u = child.key;
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `<span onclick="openProfile('${u}')">${u} (${child.val().balance} АР)</span><span class="del-btn" onclick="delUser('${u}')">✖</span>`;
                list.appendChild(div);
            });
        });
    }

    function openProfile(u) {
        selectedUser = u;
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('user-profile-panel').style.display = 'block';
        document.getElementById('prof-name').innerText = u;
        db.ref('players/' + u).on('value', s => {
            const d = s.val();
            if(d) {
                document.getElementById('prof-balance').innerText = d.balance;
                const histArr = d.history || [];
                document.getElementById('prof-history').innerHTML = histArr.slice().reverse().map((h, i) => {
                    // Оригинальный индекс в массиве (так как мы сделали reverse)
                    const realIdx = histArr.length - 1 - i;
                    return `<div class="hist-item-admin"><span>> ${h}</span><span class="hist-del" onclick="deleteHistoryItem(${realIdx})">✖</span></div>`;
                }).join('');
            }
        });
    }

    function deleteHistoryItem(idx) {
        db.ref('players/' + selectedUser + '/history').once('value', s => {
            let h = s.val() || [];
            h.splice(idx, 1); // Удаляем конкретную запись по индексу
            db.ref('players/' + selectedUser).update({ history: h });
        });
    }

    function modBal(amt) {
        db.ref('players/' + selectedUser + '/balance').transaction(b => (b || 0) + amt);
        db.ref('players/' + selectedUser + '/history').transaction(h => [...(h || []), `АДМИН: ${amt > 0 ? '+'+amt : amt} АР`].slice(-10));
    }

    function delUser(u) { if(confirm("Удалить " + u + "?")) db.ref('players/' + u).remove(); }
    function backToAdmin() { document.getElementById('user-profile-panel').style.display = 'none'; document.getElementById('admin-panel').style.display = 'block'; }
    function closePanels() { document.getElementById('admin-panel').style.display = 'none'; document.getElementById('settings-panel').style.display = 'none'; }
    function toggleSettings() { const p = document.getElementById('settings-panel'); p.style.display = (p.style.display === 'block') ? 'none' : 'block'; }
    function changeMusic() { bgMusic.src = document.getElementById('bg-music-select').value; bgMusic.play(); }
    function promptPromo() {
        const code = prompt("Промокод:"); if(!code) return;
        const c = code.trim().toUpperCase();
        let b = (c === "MELL") ? 3 : (c === "МЕЛЛ" || c === "МЕЛЛСТРОЙ") ? 5 : 0;
        if(b > 0) { db.ref('players/' + user + '/balance').transaction(v => (v || 0) + b); alert("Бонус зачислен!"); }
        else alert("Неверный код");
    }
</script>
</body>
</html>
