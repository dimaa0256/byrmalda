<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍓 БУРМАЛДА</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --spin-red: linear-gradient(180deg, #ff0000 0%, #7a0000 100%);
            --accent-red: #ff3c3c;
            --vip-gold: #ffc107;
            --panel-bg: rgba(17, 17, 17, 0.95);
        }

        /* КОСМИЧЕСКИЙ ФОН */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        @keyframes cosmicBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body { 
            display: flex; justify-content: center; align-items: center; 
            font-family: 'Arial Black', sans-serif; 
            background: linear-gradient(-45deg, #050011, #1a0000, #00051a, #0a001a);
            background-size: 400% 400%;
            animation: cosmicBG 15s ease infinite;
        }

        .stars { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; 
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)), 
                radial-gradient(2.5px 2.5px at 150px 50px, #e0e0e0, rgba(0,0,0,0)), 
                radial-gradient(1.5px 1.5px at 100px 180px, #fff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 250px 250px, #f2f2f2, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 320px 100px, #ffffff, rgba(0,0,0,0));
            background-size: 350px 350px; 
            animation: twinkle 3s infinite alternate ease-in-out; 
        }
        @keyframes twinkle { 0% { opacity: 0.2; transform: scale(0.9); } 100% { opacity: 0.8; transform: scale(1.1); } }

        .casino-machine { width: 390px; background: var(--panel-bg); border-radius: 45px; padding: 35px 25px 25px 25px; position: relative; border: 2px solid #333; box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), 0 0 20px rgba(255, 60, 60, 0.2); z-index: 10; backdrop-filter: blur(10px); }

        @keyframes glow-clean { 0%, 100% { box-shadow: 0 0 15px rgba(255, 0, 0, 0.4); } 50% { box-shadow: 0 0 35px rgba(255, 0, 0, 0.8); } }
        @keyframes burmalda-glow { 0%, 100% { text-shadow: 0 0 10px rgba(255, 60, 60, 0.6); } 50% { text-shadow: 0 0 25px rgba(255, 60, 60, 1); } }
        @keyframes vip-pulse { 0%, 100% { transform: translateX(-50%) scale(1); text-shadow: 0 0 5px var(--vip-gold); } 50% { transform: translateX(-50%) scale(1.1); text-shadow: 0 0 20px var(--vip-gold); } }

        h1 { font-size: 28px; margin: 0; color: var(--accent-red); animation: burmalda-glow 2s infinite ease-in-out; text-align: center; margin-bottom: 20px;}
        .vip-access { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); font-size: 14px; color: var(--vip-gold); font-weight: 900; letter-spacing: 6px; cursor: pointer; z-index: 10; animation: vip-pulse 2s infinite ease-in-out; }

        .btn-main { width: 100%; padding: 20px; font-size: 24px; font-weight: 900; color: #fff; border: none; border-radius: 20px; cursor: pointer; text-transform: uppercase; margin-bottom: 15px; box-sizing: border-box; }
        .btn-spin { background: var(--spin-red); box-shadow: 0 8px 0 #500; animation: glow-clean 2.5s infinite; }
        .btn-spin:disabled { filter: grayscale(1); opacity: 0.5; animation: none; }
        
        .promo-btn { width: 100%; padding: 12px; font-size: 16px; font-weight: 900; background: #222; color: #fff; border: 1px solid #444; border-radius: 15px; cursor: pointer; text-transform: uppercase; margin-bottom: 15px; transition: 0.2s; }
        .promo-btn:active { background: #111; }

        .music-list { background: #000; border: 1px solid #333; border-radius: 15px; padding: 5px; max-height: 150px; overflow-y: auto; margin-bottom: 15px; }
        .music-item { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #222; font-size: 13px; color: #ccc; }
        .music-item.active { color: var(--accent-red); background: rgba(255,0,0,0.1); }
        .music-item label { flex-grow: 1; cursor: pointer; }
        .loop-checkbox { width: 18px; height: 18px; margin-left: 10px; cursor: pointer; accent-color: var(--accent-red); }

        .info-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 15px; border: 1px solid #222; margin-bottom: 15px; }
        .balance-val { color: #00ff00; font-size: 22px; font-weight: bold; }
        .slot-container { background: #000; padding: 15px; border-radius: 20px; border: 2px solid #333; display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .slot-window { width: 85px; height: 110px; background: #111; border-radius: 12px; position: relative; overflow: hidden; }
        .slot-reel { position: absolute; top: 0; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .slot-reel span { height: 110px; font-size: 55px; line-height: 110px; display: block; }
        
        #settings-panel, #admin-panel, #user-profile-panel { display: none; position: absolute; top: 10px; left: 10px; right: 10px; background: #1e1e1e; border: 2px solid #555; padding: 20px; z-index: 100; border-radius: 30px; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        
        /* КРАСИВЫЕ И РОВНЫЕ ИНПУТЫ ДЛЯ ЛОГИНА */
        input[type="text"], input[type="password"] { 
            width: 100%; 
            box-sizing: border-box; 
            display: block; 
            margin: 0 0 15px 0; 
            padding: 18px; 
            border-radius: 20px; 
            background: #1a1a1a; 
            color: #fff; 
            border: 2px solid #444; 
            text-align: center; 
            font-size: 16px; 
            font-family: 'Arial Black', sans-serif;
            outline: none;
        }
        input[type="text"]:focus, input[type="password"]:focus { border-color: var(--accent-red); }

        input[type="range"] { width: 85%; display: block; margin: 0 auto 10px auto; }
        
        .mute-toggle { padding: 10px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; border: none; margin-bottom: 5px; }
        .on { background: #2e7d32; color: white; }
        .off { background: #c62828; color: white; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; cursor: pointer; color: white; }
        #age-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        
        .history-box { height: 60px; overflow-y: auto; font-size: 11px; color: #00ff00; font-family: monospace; background: #000; padding: 5px; border-radius: 10px; border: 1px solid #333;}
    </style>
</head>
<body onclick="closePanels()">

<div class="stars"></div>

<div id="age-gate">
    <h1 style="font-size: 45px; color: white;">🔞 18+</h1>
    <button class="btn-main" style="background: white; color: #000; width: 220px;" onclick="verifyAge()">МНЕ ЕСТЬ 18</button>
</div>

<div class="casino-machine" onclick="event.stopPropagation()">
    <div id="auth-section">
        <h1>🍓 БУРМАЛДА</h1>
        <input type="text" id="username" placeholder="ЛОГИН">
        <input type="password" id="password" placeholder="ПАРОЛЬ">
        <button onclick="login()" class="btn-main" style="background: #333;">ЗАЙТИ</button>
    </div>

    <div id="game-section" style="display:none;">
        <div class="vip-access" onclick="toggleAdmin(event)">VIP</div>
        <h1>🍓 БУРМАЛДА</h1>

        <div class="info-bar">
            <div>
                <div id="display-name" style="color:white; font-size:16px; font-weight:900;">PLAYER</div>
                <div class="balance-val">АР: <span id="balance">0</span></div>
            </div>
            <div style="font-size: 28px; cursor: pointer;" onclick="toggleSettings(event)">⚙️</div>
        </div>

        <div class="slot-container">
            <div class="slot-window"><div id="reel1" class="slot-reel"></div></div>
            <div class="slot-window"><div id="reel2" class="slot-reel"></div></div>
            <div class="slot-window"><div id="reel3" class="slot-reel"></div></div>
        </div>

        <button id="spin-btn" class="btn-main btn-spin" onclick="spin()">КРУТИТЬ</button>
        <button class="promo-btn" onclick="promptPromo()">ПРОМОКОД</button>
        
        <div style="color:white; font-size:12px; margin-bottom:5px; font-weight:bold;">История:</div>
        <div id="history" class="history-box"></div>

        <div id="settings-panel">
            <h3 style="color:white; margin:0 0 10px 0; text-align:center;">ПЛЕЙЛИСТ</h3>
            <div class="music-list" id="music-playlist"></div>
            <button id="m-toggle" class="mute-toggle on" onclick="toggleMute('music')">МУЗЫКА: ВКЛ</button>
            <input type="range" id="music-vol" min="0" max="1" step="0.1" value="0.3" oninput="applyVolumes()">
            <button id="s-toggle" class="mute-toggle on" onclick="toggleMute('sound')">ЗВУКИ: ВКЛ</button>
            <input type="range" id="sound-vol" min="0" max="1" step="0.1" value="0.7" oninput="applyVolumes()">
            <button onclick="closePanels()" style="width:100%; padding:10px; margin-top:10px; border-radius:12px; background:#444; color:#fff; border:none; cursor:pointer; font-weight:bold;">ЗАКРЫТЬ</button>
        </div>

        <div id="admin-panel">
            <h3 style="color:gold; text-align:center;">АДМИН-ПАНЕЛЬ</h3>
            <div id="users-list" style="max-height: 200px; overflow-y:auto; background:#000; border-radius:10px; padding:5px;"></div>
            <button onclick="closePanels()" style="width:100%; padding:10px; margin-top:10px; border-radius:12px; background:#444; color:#fff; border:none; font-weight:bold;">ЗАКРЫТЬ</button>
        </div>

        <div id="user-profile-panel">
            <h3 id="prof-name" style="color:red; margin-top:0; text-align:center;"></h3>
            <p style="color:white; text-align:center; font-size:18px;">АР: <span id="prof-balance" style="color:lime; font-weight:bold;"></span></p>
            
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <button onclick="modBal(1)" style="flex:1; padding:10px; background:#2e7d32; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">+1</button>
                <button onclick="modBal(10)" style="flex:1; padding:10px; background:#2e7d32; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">+10</button>
            </div>
            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <button onclick="modBal(-1)" style="flex:1; padding:10px; background:#c62828; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">-1</button>
                <button onclick="modBal(-10)" style="flex:1; padding:10px; background:#c62828; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">-10</button>
            </div>
            
            <div style="color:white; font-size:12px; margin-bottom:5px;">История игрока:</div>
            <div id="prof-history" class="history-box" style="margin-bottom:10px;"></div>

            <button onclick="backToAdmin()" style="width:100%; padding:10px; background:#444; color:#fff; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">НАЗАД</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCyptPoeoccBngAMfG_R-t32FOfIGJY13s",
        databaseURL: "https://dima256-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "dima256",
        appId: "1:208400853144:web:78eb608f5aacd57e8848ed"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const playlist = [
        { name: "Бэм Бэм Бэм", file: "bam_bam_bam_1.mp3" },
        { name: "Nobody", file: "nobody.mp3" },
        { name: "Баклажан", file: "baclachn.mp3" },
        { name: "Пау Пау Пау", file: "pay_pay_pay.mp3" },
        { name: "Bad Piggies", file: "bad_piggies.mp3" },
        { name: "Ананасовый сироп", file: "ananasevi_sirop_1.mp3" },
        { name: "Концерт Артура №1", file: "consert_artyra№1.mp3" },
        { name: "Концерт Артура №2", file: "consert_artyra№2.mp3" },
        { name: "Концерт Артура №3", file: "consert_artyra№3.mp3" },
        { name: "баблгам№1", file: "bablgam_1.mp3" },
        { name: "баблгам№2", file: "bablgam_2.mp3" },
        { name: "Angry Birds", file: "angry_birds.mp3" },
        { name: "оркестр-БЭМ", file: "orcestr_BAM_1.mp3" },
        { name: "птички", file: "ptichki_1.mp3" }
    ];

    const icons = ['🍏', '🍌', '🍓', '🍒', '🍋'];
    const S = {
        win2: new Audio('vrode_da_vrode_net_1.mp3'),
        interpol: new Audio('zapert_na_ostrove_izza_interpola_1.mp3'),
        milion: new Audio('milion_dvesti_na_balance_1.mp3'),
        jps: [new Audio('o_mai_gad_1.mp3'), new Audio('nixya_ti_blat_1.mp3')]
    };

    let user = ""; let selU = ""; let currentTrackIdx = 0; 
    let bgMusic = new Audio(playlist[0].file);
    bgMusic.loop = true; 
    let mOn = true; let sOn = true; let milionPlayed = false;

    function renderPlaylist() {
        const container = document.getElementById('music-playlist');
        container.innerHTML = playlist.map((t, idx) => `
            <div class="music-item ${idx === currentTrackIdx ? 'active' : ''}">
                <label onclick="playTrack(${idx})">${t.name}</label>
                <input type="checkbox" class="loop-checkbox" id="loop-${idx}" onclick="updateLoop(${idx})" ${idx === currentTrackIdx && bgMusic.loop ? 'checked' : ''}>
            </div>
        `).join('');
    }

    function updateLoop(idx) {
        if (idx === currentTrackIdx) bgMusic.loop = document.getElementById(`loop-${idx}`).checked;
    }

    function playTrack(idx) {
        bgMusic.pause(); currentTrackIdx = idx;
        bgMusic.src = playlist[idx].file;
        bgMusic.loop = document.getElementById(`loop-${idx}`).checked;
        if(mOn) bgMusic.play().catch(()=>{});
        renderPlaylist();
    }

    bgMusic.onended = () => {
        if (!bgMusic.loop) playTrack((currentTrackIdx + 1) % playlist.length);
    };

    function login() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        if(!u || !p) return;
        db.ref('players/' + u).once('value').then(s => {
            if(!s.exists()) db.ref('players/' + u).set({balance: 5, password: p, history: ["Регистрация"]}).then(() => { user = u; go(); });
            else if(s.val().password === p) { user = u; go(); }
            else alert("Неверный пароль!");
        });
    }

    function go() {
        document.getElementById('auth-section').style.display='none';
        document.getElementById('game-section').style.display='block';
        document.getElementById('display-name').innerText = user;
        fillReels(); applyVolumes(); renderPlaylist();
        db.ref('players/' + user).on('value', snap => {
            const d = snap.val(); if(!d) return;
            document.getElementById('balance').innerText = d.balance;
            document.getElementById('history').innerHTML = (d.history || []).slice().reverse().map(h => `<div>> ${h}</div>`).join('');
            if (d.balance >= 120 && !milionPlayed) { if(sOn) S.milion.play(); milionPlayed = true; }
            else if (d.balance < 120) { milionPlayed = false; }
        });
    }

    function fillReels() {
        [1,2,3].forEach(n => {
            let h = ''; for(let i=0; i<30; i++) h += `<span>${icons[Math.floor(Math.random()*5)]}</span>`;
            document.getElementById('reel'+n).innerHTML = h;
        });
    }

    async function spin() {
        const s = await db.ref('players/' + user).once('value');
        const d = s.val(); if(d.balance < 1) { if(sOn) S.interpol.play(); return; }
        const res = [icons[Math.floor(Math.random()*5)], icons[Math.floor(Math.random()*5)], icons[Math.floor(Math.random()*5)]];
        document.getElementById('spin-btn').disabled = true;
        [1,2,3].forEach((n, i) => {
            const r = document.getElementById('reel'+n);
            r.style.transition = '0s'; r.style.transform = 'translateY(0)';
            r.querySelector('span:last-child').innerText = res[i];
            setTimeout(() => { r.style.transition = `transform ${2+i}s ease-in-out`; r.style.transform = 'translateY(-3190px)'; }, 50);
        });
        setTimeout(() => {
            let win = (res[0]===res[1] && res[1]===res[2]) ? 5 : (res[0]===res[1] || res[1]===res[2] || res[0]===res[2] ? 2 : 0);
            if(sOn && win > 0) { if(win===5) S.jps[Math.floor(Math.random()*2)].play(); else S.win2.play(); }
            db.ref('players/' + user).update({ balance: d.balance - 1 + win, history: [...(d.history || []), `${res.join('')} | ${win-1>=0?'+':''}${win-1} АР`].slice(-15) });
            document.getElementById('spin-btn').disabled = false;
        }, 5000);
    }

    // ПРОМОКОДЫ: ТЕПЕРЬ ОДНОРАЗОВЫЕ ДЛЯ КАЖДОГО ИГРОКА
    function promptPromo() {
        const input = prompt("Введи промокод:");
        if (!input) return;
        const code = input.trim().toLowerCase();
        let reward = 0;
        
        if (code === "mell") reward = 3;
        else if (code === "мелл") reward = 5;
        else if (code === "меллстрой") reward = 5;
        else { alert("Промокод не найден или уже истек!"); return; }

        db.ref('players/' + user).once('value').then(s => {
            let d = s.val();
            
            // Проверка: использовал ли игрок уже этот промокод?
            let used = d.usedPromos || {};
            if (used[code]) {
                alert("Ты уже использовал этот промокод!");
                return;
            }
            
            // Отмечаем промокод как использованный
            used[code] = true;

            db.ref('players/' + user).update({
                balance: d.balance + reward,
                usedPromos: used,
                history: [...(d.history || []), `ПРОМО: ${code} | +${reward} АР`].slice(-15)
            });
            alert(`Успешно! Начислено ${reward} АР.`);
        });
    }

    function toggleAdmin(e) { e.stopPropagation(); if (prompt("Пароль:") === "1337") { document.getElementById('admin-panel').style.display = 'block'; loadUsers(); } }
    
    function loadUsers() {
        db.ref('players').on('value', s => {
            const list = document.getElementById('users-list'); list.innerHTML = "";
            s.forEach(c => {
                const div = document.createElement('div'); div.className = "user-row";
                div.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        <span onclick="delUserFromList(event, '${c.key}')" style="color:red; font-size:16px; margin-right:10px; font-weight:bold;">✖</span>
                        <span onclick="openProfile('${c.key}')" style="flex-grow:1;">${c.key}</span>
                    </div>
                    <span onclick="openProfile('${c.key}')">${c.val().balance} АР</span>
                `;
                list.appendChild(div);
            });
        });
    }
    
    function delUserFromList(e, u) {
        e.stopPropagation();
        if(confirm(`Точно удалить игрока ${u}?`)) db.ref('players/'+u).remove();
    }

    function openProfile(u) { 
        selU = u; 
        document.getElementById('admin-panel').style.display='none'; 
        document.getElementById('user-profile-panel').style.display='block'; 
        document.getElementById('prof-name').innerText = u; 
        db.ref('players/'+u).on('value', s => {
            if(s.exists()) {
                document.getElementById('prof-balance').innerText = s.val().balance;
                document.getElementById('prof-history').innerHTML = (s.val().history || []).slice().reverse().map(h => `<div>> ${h}</div>`).join('');
            }
        }); 
    }
    
    function modBal(v) { db.ref('players/'+selU+'/balance').transaction(b => (b||0)+v); }
    function backToAdmin() { document.getElementById('user-profile-panel').style.display='none'; document.getElementById('admin-panel').style.display='block'; }

    function toggleSettings(e) { e.stopPropagation(); document.getElementById('settings-panel').style.display = 'block'; renderPlaylist(); }
    function closePanels() { ['settings-panel', 'admin-panel', 'user-profile-panel'].forEach(p => document.getElementById(p).style.display = 'none'); }
    
    function applyVolumes() { 
        const mVol = document.getElementById('music-vol').value; const sVol = document.getElementById('sound-vol').value;
        bgMusic.volume = mOn ? mVol : 0; if(mOn) bgMusic.play().catch(()=>{}); else bgMusic.pause();
        document.getElementById('m-toggle').className = mOn?"mute-toggle on":"mute-toggle off";
        document.getElementById('s-toggle').className = sOn?"mute-toggle on":"mute-toggle off";
        Object.values(S).flat().forEach(a => { if(a instanceof Audio) a.volume = sOn ? sVol : 0; });
    }
    function toggleMute(t) { if(t==='music') mOn=!mOn; else sOn=!sOn; applyVolumes(); }
    
    function verifyAge() { localStorage.setItem('adult', 'true'); document.getElementById('age-gate').remove(); }
    if (localStorage.getItem('adult') === 'true') document.getElementById('age-gate')?.remove();
</script>
</body>
</html>
